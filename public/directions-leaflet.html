<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chỉ Đường Miễn Phí (Leaflet + OSRM)</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- CSS của Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <!-- CSS giao diện -->
  <link rel="stylesheet" href="directions.css" />
</head>
<body>

  <!-- Bảng điều khiển bên trái -->
  <aside class="sidebar">
    <header class="header">
      <a href="index.html" class="back-btn" aria-label="Trở về trang chủ">←</a>
      <h1>Chỉ Đường (Leaflet Bản Free)</h1>
    </header>

    <div class="input-section">
      <div class="input-group">
        <div class="route-line"></div>
        <div class="input-box">
          <span class="input-icon">🔵</span>
          <input type="text" id="origin-input" placeholder="Điểm đi (vd: Hà Nội)" autocomplete="off" />
        </div>
        <div class="input-box">
          <span class="input-icon" style="color: red;">📍</span>
          <input type="text" id="dest-input" placeholder="Điểm đến (vd: Sapa)" autocomplete="off" />
        </div>
      </div>
      <button class="btn-search" id="search-btn">Tìm đường đi</button>
      <p id="status-message"></p>
    </div>

    <!-- UI Dành riêng cho Chế độ Lịch Trình (ẩn mặc định) -->
    <div id="iti-section" class="input-section" style="display:none; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; margin-bottom: 24px;">
      <h3 style="margin-bottom: 8px; font-size: 1.1rem; color: #1e3a8a;">🧭 Lịch Trình Trí Tuệ AI</h3>
      <p id="iti-progress" style="font-size: 0.95rem; font-weight: bold; color: #000; margin-bottom: 4px;">Đang tải...</p>
      <p id="iti-next" style="font-size: 0.85rem; color: #475569; margin-bottom: 12px; line-height: 1.4;">Đang dò vị trí định vị của bạn...</p>
      <button class="btn-search" id="start-iti-btn" style="background: #10b981;">🚀 Bắt Đầu Hành Trình</button>
      <button class="btn-search" id="skip-iti-btn" style="background: #ef4444; margin-top: 8px; display: none;">⏭️ Bỏ Qua Điểm Này</button>
      
      <!-- Manual start for itineraries -->
      <div id="iti-manual-start" style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed #bfdbfe; display: none;">
        <p style="font-size: 0.8rem; color: #1e3a8a; margin-bottom: 4px;">📍 Nhập điểm bắt đầu thủ công (Nếu GPS lỗi):</p>
        <div style="display: flex; gap: 4px;">
          <input type="text" id="iti-origin-input" placeholder="Nhập địa chỉ của bạn..." style="flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #bfdbfe; font-size: 0.85rem;" />
          <button type="button" id="iti-apply-origin-btn" style="padding: 4px 8px; background: #1e3a8a; color: white; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer;">Dùng</button>
        </div>
      </div>
    </div>

    <!-- Chọn phương thức di chuyển -->
    <div class="modes-section">
      <button class="mode-btn" data-mode="foot" id="mode-walking">
        <span style="font-size:1.2rem">🚶</span>
        Đi bộ
      </button>
      <!-- Mode driving mặc định của OSRM có thể dùng chung cho xe máy (car/driving) -->
      <button class="mode-btn active" data-mode="driving" id="mode-driving">
        <span style="font-size:1.2rem">🚗</span>
        Xe máy / Ô tô
      </button>
    </div>

    <!-- Kết quả -->
    <div class="results-section">
      <div class="route-summary" id="route-summary">
        <div class="summary-title" id="summary-time">-- phút</div>
        <div class="summary-meta" id="summary-distance">-- km</div>
        
        <button class="btn-ai" id="ask-ai-btn">
          ✨ Trợ lý AI Khuyên Dùng
        </button>
      </div>

      <div class="ai-advice-box" id="ai-advice-box">
        <!-- AI output sẽ ở đây -->
      </div>
    </div>
  </aside>

  <!-- Bản đồ bên phải -->
  <div class="map-container">
    <div id="map"></div>
  </div>

  <!-- JS của Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- JS logic của chúng ta -->
  <script src="voice-helper.js"></script>
  <script src="directions-leaflet.js"></script>
</body>
</html>
