<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🛰️ GPS Test — OpenStreetMap + Leaflet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1c2840;
      --accent: #22d3ee;
      --accent2: #818cf8;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(255,255,255,0.07);
      --glow: 0 0 24px rgba(34,211,238,0.25);
    }

    html, body {
      height: 100%;
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge--live {
      background: rgba(16,185,129,0.15);
      color: var(--green);
      border: 1px solid rgba(16,185,129,0.4);
      animation: pulse-badge 2s infinite;
    }

    .badge--waiting {
      background: rgba(245,158,11,0.15);
      color: var(--yellow);
      border: 1px solid rgba(245,158,11,0.4);
    }

    .badge--error {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.4);
    }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== MAP ===== */
    #map {
      width: 100%;
      height: 100%;
      background: #0d1824;
    }

    /* ===== INFO PANEL ===== */
    .info-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }

    /* ===== GPS BUTTON ===== */
    .gps-fab {
      position: absolute;
      bottom: 130px;
      right: 16px;
      z-index: 1000;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: var(--glow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gps-fab:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(34,211,238,0.4); }
    .gps-fab:active { transform: translateY(0); }

    .gps-fab.tracking {
      background: linear-gradient(135deg, var(--green), #059669);
      animation: glow-tracking 2s infinite;
    }

    @keyframes glow-tracking {
      0%, 100% { box-shadow: 0 0 16px rgba(16,185,129,0.4); }
      50%       { box-shadow: 0 0 32px rgba(16,185,129,0.7); }
    }

    /* ===== LOG OVERLAY ===== */
    .log-overlay {
      position: absolute;
      top: 70px;
      left: 12px;
      z-index: 999;
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 320px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .log-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 0.8rem;
    }

    .log-entry { color: var(--muted); transition: color 0.3s; }
    .log-entry.new { color: var(--text); }
    .log-entry.ok  { color: var(--green); }
    .log-entry.err { color: var(--red); }

    /* ===== ACCURACY RING (CSS pulse) ===== */
    @keyframes accuracy-pulse {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* ===== LEAFLET OVERRIDES (dark tile) ===== */
    .leaflet-container { background: #0d1824; }

    /* Custom marker */
    .my-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(34,211,238,0.4);
    }

    /* map wrapper relative */
    .map-wrap { position: relative; flex: 1; overflow: hidden; }

    /* scrollbar for log */
    .log-overlay::-webkit-scrollbar { width: 4px; }
    .log-overlay::-webkit-scrollbar-track { background: transparent; }
    .log-overlay::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Accuracy meter */
    .acc-meter {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .acc-bar-bg {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .acc-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s, background 0.5s;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">🛰️ GPS Live Test</div>
      <span class="badge badge--waiting" id="status-badge">⏳ Chờ GPS</span>
    </div>
    <div style="font-size:0.78rem;color:var(--muted);">Leaflet + OpenStreetMap</div>
  </header>

  <!-- MAP AREA -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- Log overlay -->
    <div class="log-overlay">
      <div class="log-title">📋 Nhật ký GPS</div>
      <div id="log-list">
        <div class="log-entry">Nhấn nút GPS để bắt đầu theo dõi...</div>
      </div>
    </div>

    <!-- FAB button -->
    <button class="gps-fab" id="gps-btn" onclick="toggleGPS()">
      <span id="gps-icon">📍</span>
      <span id="gps-label">Bật GPS</span>
    </button>
  </div>

  <!-- INFO PANEL -->
  <div class="info-panel">
    <div class="stat-card">
      <span class="stat-label">Vĩ độ (Lat)</span>
      <span class="stat-value accent" id="val-lat">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Kinh độ (Lng)</span>
      <span class="stat-value accent" id="val-lng">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Độ chính xác</span>
      <span class="stat-value green" id="val-acc">—</span>
      <div class="acc-meter">
        <div class="acc-bar-bg"><div class="acc-bar-fill" id="acc-bar" style="width:0%;background:var(--green)"></div></div>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Tốc độ</span>
      <span class="stat-value yellow" id="val-speed">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Độ cao</span>
      <span class="stat-value" id="val-alt">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Cập nhật lần</span>
      <span class="stat-value" id="val-count">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Thời gian</span>
      <span class="stat-value" id="val-time">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Hướng</span>
      <span class="stat-value" id="val-heading">—</span>
    </div>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
// ─────────────────────────────────────────────
//  MAP INIT
// ─────────────────────────────────────────────
const map = L.map('map', {
  center: [16.047079, 108.206230], // Đà Nẵng mặc định
  zoom: 6,
  zoomControl: true,
  attributionControl: true
});

// Dark tile từ CartoDB (miễn phí, đẹp, không cần key)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let watchId      = null;
let isTracking   = false;
let updateCount  = 0;
let userMarker   = null;
let accuracyCircle = null;
let pathLine     = null;
let pathCoords   = [];

// ─────────────────────────────────────────────
//  LOG HELPER
// ─────────────────────────────────────────────
function addLog(msg, type = '') {
  const list = document.getElementById('log-list');
  const el   = document.createElement('div');
  el.className = `log-entry ${type} new`;
  el.textContent = `[${new Date().toLocaleTimeString('vi-VN')}] ${msg}`;
  list.insertBefore(el, list.firstChild);     // newest on top
  setTimeout(() => el.classList.remove('new'), 1500);
  // keep max 30 entries
  while (list.children.length > 30) list.removeChild(list.lastChild);
}

// ─────────────────────────────────────────────
//  GPS TOGGLE
// ─────────────────────────────────────────────
function toggleGPS() {
  if (!isTracking) startGPS();
  else             stopGPS();
}

function startGPS() {
  if (!navigator.geolocation) {
    addLog('❌ Trình duyệt không hỗ trợ Geolocation!', 'err');
    setBadge('error', '❌ Không hỗ trợ');
    return;
  }

  addLog('🚀 Khởi động theo dõi GPS...', 'ok');
  setBadge('waiting', '⌛ Đang định vị...');

  watchId = navigator.geolocation.watchPosition(
    onLocation,
    onError,
    {
      enableHighAccuracy: true,
      maximumAge:         1000,   // tối đa dùng cache 1 giây
      timeout:            15000   // chờ tối đa 15 giây
    }
  );

  isTracking = true;
  document.getElementById('gps-btn').classList.add('tracking');
  document.getElementById('gps-icon').textContent  = '🔴';
  document.getElementById('gps-label').textContent = 'Dừng GPS';
}

function stopGPS() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  isTracking = false;
  document.getElementById('gps-btn').classList.remove('tracking');
  document.getElementById('gps-icon').textContent  = '📍';
  document.getElementById('gps-label').textContent = 'Bật GPS';
  setBadge('waiting', '⏸️ Đã dừng');
  addLog('⏹️ Đã dừng theo dõi GPS.');
}

// ─────────────────────────────────────────────
//  SUCCESS CALLBACK
// ─────────────────────────────────────────────
function onLocation(pos) {
  const { latitude: lat, longitude: lng, accuracy, altitude, speed, heading } = pos.coords;
  const ts = new Date(pos.timestamp);

  updateCount++;

  // ── Cập nhật UI ──
  document.getElementById('val-lat').textContent    = lat.toFixed(7);
  document.getElementById('val-lng').textContent    = lng.toFixed(7);
  document.getElementById('val-acc').textContent    = accuracy < 1 ? '<1 m'  : `${Math.round(accuracy)} m`;
  document.getElementById('val-speed').textContent  = speed   != null ? `${(speed * 3.6).toFixed(1)} km/h` : 'N/A';
  document.getElementById('val-alt').textContent    = altitude != null ? `${altitude.toFixed(1)} m` : 'N/A';
  document.getElementById('val-count').textContent  = updateCount;
  document.getElementById('val-time').textContent   = ts.toLocaleTimeString('vi-VN');
  document.getElementById('val-heading').textContent= heading != null ? `${Math.round(heading)}°` : 'N/A';

  // ── Accuracy bar: ≤5m = xanh, ≤30m = vàng, >30m = đỏ ──
  const accBar   = document.getElementById('acc-bar');
  const maxAcc   = 200;
  const barWidth = Math.max(5, 100 - (accuracy / maxAcc) * 100);
  accBar.style.width      = `${barWidth}%`;
  accBar.style.background = accuracy <= 5 ? 'var(--green)' : accuracy <= 30 ? 'var(--yellow)' : 'var(--red)';

  // ── Badge ──
  const qual = accuracy <= 10 ? '🟢 Rất tốt' : accuracy <= 50 ? '🟡 Tốt' : '🟠 Vừa';
  setBadge('live', `${qual} — ±${Math.round(accuracy)}m`);

  // ── Bản đồ ──
  const latlng = [lat, lng];

  // Marker vị trí
  if (!userMarker) {
    const myIcon = L.divIcon({ className: '', html: '<div class="my-dot"></div>', iconSize: [18,18], iconAnchor: [9,9] });
    userMarker = L.marker(latlng, { icon: myIcon, zIndexOffset: 1000 }).addTo(map);
    map.setView(latlng, 16);
  } else {
    userMarker.setLatLng(latlng);
  }

  // Vòng tròn độ chính xác
  if (!accuracyCircle) {
    accuracyCircle = L.circle(latlng, {
      radius: accuracy,
      color:  '#22d3ee',
      fillColor: '#22d3ee',
      fillOpacity: 0.08,
      weight: 1.5,
      dashArray: '6,4'
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(latlng);
    accuracyCircle.setRadius(accuracy);
  }

  // Vệt đường đi
  pathCoords.push(latlng);
  if (!pathLine) {
    pathLine = L.polyline(pathCoords, {
      color: '#818cf8',
      weight: 3,
      opacity: 0.7,
      lineJoin: 'round',
      lineCap: 'round'
    }).addTo(map);
  } else {
    pathLine.setLatLngs(pathCoords);
  }

  // Popup thông tin
  userMarker.bindPopup(
    `<b>📍 Vị trí của bạn</b><br>` +
    `Lat: ${lat.toFixed(6)}<br>` +
    `Lng: ${lng.toFixed(6)}<br>` +
    `±${Math.round(accuracy)} m`
  );

  // Log
  if (updateCount === 1) {
    addLog(`✅ Lấy được GPS lần đầu! Lat=${lat.toFixed(5)}, Lng=${lng.toFixed(5)}`, 'ok');
  } else {
    addLog(`📡 Cập nhật #${updateCount} — ±${Math.round(accuracy)}m`);
  }
}

// ─────────────────────────────────────────────
//  ERROR CALLBACK
// ─────────────────────────────────────────────
function onError(err) {
  let msg = '';
  switch (err.code) {
    case err.PERMISSION_DENIED:
      msg = '❌ Người dùng từ chối quyền GPS. Hãy cho phép trong cài đặt trình duyệt.';
      break;
    case err.POSITION_UNAVAILABLE:
      msg = '⚠️ Vị trí không khả dụng (GPS tắt hoặc tín hiệu yếu)';
      break;
    case err.TIMEOUT:
      msg = '⏱️ Hết thời gian chờ GPS. Đang thử lại...';
      break;
    default:
      msg = `❓ Lỗi không xác định: ${err.message}`;
  }
  addLog(msg, 'err');
  setBadge('error', '❌ Lỗi GPS');
}

// ─────────────────────────────────────────────
//  BADGE HELPER
// ─────────────────────────────────────────────
function setBadge(type, text) {
  const badge = document.getElementById('status-badge');
  badge.className = `badge badge--${type}`;
  badge.textContent = text;
}

// ─────────────────────────────────────────────
//  CLICK MAP → thêm marker thử
// ─────────────────────────────────────────────
map.on('click', function(e) {
  const { lat, lng } = e.latlng;
  L.popup()
    .setLatLng(e.latlng)
    .setContent(`<b>📌 Điểm bạn chọn</b><br>Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`)
    .openOn(map);
  addLog(`🖱️ Click bản đồ — Lat=${lat.toFixed(5)}, Lng=${lng.toFixed(5)}`);
});

// ─────────────────────────────────────────────
//  AUTO CHECCK HTTPS
// ─────────────────────────────────────────────
window.addEventListener('load', () => {
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (!isSecure) {
    addLog('⚠️ Không phải HTTPS — GPS có thể bị chặn trên một số trình duyệt!', 'err');
    setBadge('error', '⚠️ Cần HTTPS');
  } else {
    addLog(`✅ Giao thức an toàn (${location.protocol}) — GPS sẵn sàng!`, 'ok');
    setBadge('waiting', '✅ Sẵn sàng');
  }
  addLog(`🌐 URL: ${location.href}`);
  addLog(`🖥️ UserAgent: ${navigator.userAgent.split(' ').slice(-2).join(' ')}`);
});
</script>
</body>
</html>
